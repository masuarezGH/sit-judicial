services:
  mysql:
    image: mysql:8.0
    container_name: sit_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sit_judicial
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql

  backend:
    build: .
    container_name: sit_backend
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: sit_judicial
      JWT_SECRET: tu_clave_secreta
      JWT_EXPIRES_IN: 2h
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mysql_data: